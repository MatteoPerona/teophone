<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>teophone</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      cursor: crosshair;
      user-select: none;
    }

    canvas {
      display: block;
    }

    #speed-control {
      position: fixed;
      right: 24px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 2px;
    }

    #speed-control label {
      color: #666;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      writing-mode: vertical-rl;
      text-orientation: mixed;
    }

    #speed-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 120px;
      height: 2px;
      background: #444;
      outline: none;
      transform: rotate(-90deg);
      transform-origin: center;
    }

    #speed-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 10px;
      height: 10px;
      background: #aaa;
      border-radius: 50%;
      cursor: pointer;
    }

    #speed-slider::-webkit-slider-thumb:hover {
      background: #ccc;
    }

    #tempo-control {
      position: fixed;
      left: 24px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 2px;
    }

    #tempo-control label {
      color: #666;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      writing-mode: vertical-rl;
      text-orientation: mixed;
    }

    #tempo-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 120px;
      height: 2px;
      background: #444;
      outline: none;
      transform: rotate(-90deg);
      transform-origin: center;
    }

    #tempo-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 10px;
      height: 10px;
      background: #aaa;
      border-radius: 50%;
      cursor: pointer;
    }

    #tempo-slider::-webkit-slider-thumb:hover {
      background: #ccc;
    }

    #pulses-control {
      position: fixed;
      left: 32px;
      bottom: 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    #pulses-control label {
      color: #666;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    #pulses-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 120px;
      height: 2px;
      background: #444;
      outline: none;
    }

    #pulses-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 10px;
      height: 10px;
      background: #aaa;
      border-radius: 50%;
      cursor: pointer;
    }

    #pulses-slider::-webkit-slider-thumb:hover {
      background: #ccc;
    }

    #pulses-display {
      color: #666;
      font-size: 10px;
      letter-spacing: 1px;
    }

    #mode-toggle {
      position: fixed;
      top: 16px;
      right: 16px;
      background: none;
      border: 1px solid #444;
      color: #888;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 4px 10px;
      cursor: pointer;
      border-radius: 2px;
    }

    #mode-toggle:hover {
      border-color: #888;
      color: #ccc;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <button id="mode-toggle">throw</button>
  <div id="speed-control">
    <input type="range" id="speed-slider" min="0" max="4" step="0.05" value="1">
    <label>speed</label>
  </div>
  <div id="tempo-control">
    <input type="range" id="tempo-slider" min="60" max="200" step="1" value="120">
    <label>bpm</label>
  </div>
  <div id="pulses-control">
    <span id="pulses-display">16</span>
    <input type="range" id="pulses-slider" min="1" max="64" step="1" value="16">
    <label>pulses</label>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const speedSlider = document.getElementById('speed-slider');
    const tempoSlider = document.getElementById('tempo-slider');
    const pulsesSlider = document.getElementById('pulses-slider');
    const pulsesDisplay = document.getElementById('pulses-display');

    pulsesSlider.addEventListener('input', () => {
      pulsesDisplay.textContent = pulsesSlider.value;
    });

    let width, height;
    let mouseX = 0;
    let mouseY = 0;
    let stones = [];
    let audioCtx = null;

    // --- Window movement tracking ---
    let lastScreenX = window.screenX;
    let lastScreenY = window.screenY;

    // --- Quantization ---
    // Pending hits get snapped to the nearest 16th note
    let pendingHits = [];
    let lastTickTime = 0;
    let currentPulse = 0;
    let pulseFlash = 0;

    // --- Stone types mapped to keys ---
    const STONE_KEYS = {
      'a': { radius: 6,  mass: 1,   freq: 800,  color: '#e0e0e0', decay: 0.04 },
      's': { radius: 9,  mass: 1.5, freq: 600,  color: '#c8c8c8', decay: 0.06 },
      'd': { radius: 12, mass: 2,   freq: 440,  color: '#b0b0b0', decay: 0.08 },
      'f': { radius: 16, mass: 3,   freq: 320,  color: '#989898', decay: 0.10 },
      'g': { radius: 20, mass: 4,   freq: 220,  color: '#808080', decay: 0.12 },
      'h': { radius: 25, mass: 5.5, freq: 160,  color: '#686868', decay: 0.14 },
      'j': { radius: 30, mass: 7,   freq: 110,  color: '#505050', decay: 0.16 },
      'k': { radius: 36, mass: 9,   freq: 80,   color: '#383838', decay: 0.18 },
      'l': { radius: 42, mass: 12,  freq: 55,   color: '#282828', decay: 0.20 },
    };

    // --- Resize ---
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // --- Audio ---
    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
    }

    function queueHit(freq, velocity, decay) {
      pendingHits.push({ freq, velocity, decay });
    }

    function flushHits() {
      if (pendingHits.length === 0) return;

      // Merge hits that are very similar (within an octave) to avoid overload
      const merged = [];
      for (const hit of pendingHits) {
        let found = false;
        for (const m of merged) {
          if (Math.abs(m.freq - hit.freq) < m.freq * 0.5) {
            m.velocity = Math.max(m.velocity, hit.velocity);
            found = true;
            break;
          }
        }
        if (!found) merged.push({ ...hit });
      }
      pendingHits = [];

      for (const hit of merged) {
        playHit(hit.freq, hit.velocity, hit.decay);
      }
    }

    function playHit(freq, velocity, decay) {
      if (!audioCtx) return;
      const vol = Math.min(1, velocity / 400);
      if (vol < 0.01) return;

      const now = audioCtx.currentTime;
      const duration = decay * (0.5 + vol * 0.5);

      // Noise burst for the attack
      const bufferSize = Math.max(1, Math.floor(audioCtx.sampleRate * duration));
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufferSize * 0.15));
      }

      const noise = audioCtx.createBufferSource();
      noise.buffer = buffer;

      const noiseFilter = audioCtx.createBiquadFilter();
      noiseFilter.type = 'bandpass';
      noiseFilter.frequency.value = freq * 2;
      noiseFilter.Q.value = 1.5;

      const noiseGain = audioCtx.createGain();
      noiseGain.gain.setValueAtTime(vol * 0.4, now);
      noiseGain.gain.exponentialRampToValueAtTime(0.001, now + duration);

      noise.connect(noiseFilter);
      noiseFilter.connect(noiseGain);
      noiseGain.connect(audioCtx.destination);
      noise.start(now);
      noise.stop(now + duration);

      // Tone body
      const osc = audioCtx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, now);
      osc.frequency.exponentialRampToValueAtTime(freq * 0.5, now + duration);

      const oscGain = audioCtx.createGain();
      oscGain.gain.setValueAtTime(vol * 0.3, now);
      oscGain.gain.exponentialRampToValueAtTime(0.001, now + duration);

      osc.connect(oscGain);
      oscGain.connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + duration);
    }

    // --- Stone ---
    class Stone {
      constructor(x, y, type, speedMult) {
        this.x = x;
        this.y = y;
        if (speedMult === 0) {
          this.vx = 0;
          this.vy = 0;
        } else {
          const angle = Math.random() * Math.PI * 2;
          const baseSpeed = (2 + Math.random() * 3) * speedMult;
          this.vx = Math.cos(angle) * baseSpeed;
          this.vy = Math.sin(angle) * baseSpeed;
        }
        this.radius = type.radius;
        this.mass = type.mass;
        this.freq = type.freq;
        this.color = type.color;
        this.decay = type.decay;
        this.flash = 0;
        this.frozen = false;
      }

      update() {
        if (this.frozen) return;
        this.x += this.vx;
        this.y += this.vy;

        // Flash decay
        if (this.flash > 0) this.flash -= 0.05;

        // Wall collisions — all four edges
        if (this.x - this.radius < 0) {
          this.x = this.radius;
          this.vx = Math.abs(this.vx);
          const impact = Math.abs(this.vx) * this.mass;
          if (impact > 1) {
            queueHit(this.freq, impact * 20, this.decay);
            this.flash = Math.min(1, impact / 10);
          }
        }
        if (this.x + this.radius > width) {
          this.x = width - this.radius;
          this.vx = -Math.abs(this.vx);
          const impact = Math.abs(this.vx) * this.mass;
          if (impact > 1) {
            queueHit(this.freq, impact * 20, this.decay);
            this.flash = Math.min(1, impact / 10);
          }
        }
        if (this.y - this.radius < 0) {
          this.y = this.radius;
          this.vy = Math.abs(this.vy);
          const impact = Math.abs(this.vy) * this.mass;
          if (impact > 1) {
            queueHit(this.freq, impact * 20, this.decay);
            this.flash = Math.min(1, impact / 10);
          }
        }
        if (this.y + this.radius > height) {
          this.y = height - this.radius;
          this.vy = -Math.abs(this.vy);
          const impact = Math.abs(this.vy) * this.mass;
          if (impact > 1) {
            queueHit(this.freq, impact * 20, this.decay);
            this.flash = Math.min(1, impact / 10);
          }
        }
      }

      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);

        if (this.flash > 0) {
          const brightness = Math.floor(this.flash * 255);
          ctx.fillStyle = `rgb(${brightness}, ${brightness}, ${brightness})`;
        } else {
          ctx.fillStyle = this.color;
        }
        ctx.fill();
      }
    }

    // --- Stone-stone collisions ---
    function collideStones() {
      for (let i = 0; i < stones.length; i++) {
        for (let j = i + 1; j < stones.length; j++) {
          const a = stones[i];
          const b = stones[j];
          const dx = b.x - a.x;
          const dy = b.y - a.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          const minDist = a.radius + b.radius;

          if (dist < minDist && dist > 0) {
            const nx = dx / dist;
            const ny = dy / dist;

            const dvx = a.vx - b.vx;
            const dvy = a.vy - b.vy;
            const dvn = dvx * nx + dvy * ny;

            if (dvn > 0) {
              // Save speeds before collision
              const aSpeed = Math.sqrt(a.vx * a.vx + a.vy * a.vy);
              const bSpeed = Math.sqrt(b.vx * b.vx + b.vy * b.vy);

              const impulse = dvn / (1 / a.mass + 1 / b.mass);

              a.vx -= (impulse / a.mass) * nx;
              a.vy -= (impulse / a.mass) * ny;
              b.vx += (impulse / b.mass) * nx;
              b.vy += (impulse / b.mass) * ny;

              // Restore original speeds (change direction, not magnitude)
              const aNewSpeed = Math.sqrt(a.vx * a.vx + a.vy * a.vy);
              const bNewSpeed = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
              if (aNewSpeed > 0) { a.vx *= aSpeed / aNewSpeed; a.vy *= aSpeed / aNewSpeed; }
              if (bNewSpeed > 0) { b.vx *= bSpeed / bNewSpeed; b.vy *= bSpeed / bNewSpeed; }

              // Sound — blend the two frequencies
              const impact = Math.abs(dvn);
              if (impact > 1) {
                const mixedFreq = (a.freq + b.freq) / 2;
                const mixedDecay = (a.decay + b.decay) / 2;
                queueHit(mixedFreq, impact * Math.min(a.mass, b.mass) * 15, mixedDecay);
                a.flash = Math.min(1, impact / 8);
                b.flash = Math.min(1, impact / 8);
              }
            }

            // Separate overlapping stones
            const overlap = minDist - dist;
            const totalMass = a.mass + b.mass;
            a.x -= (overlap * (b.mass / totalMass)) * nx;
            a.y -= (overlap * (b.mass / totalMass)) * ny;
            b.x += (overlap * (a.mass / totalMass)) * nx;
            b.y += (overlap * (a.mass / totalMass)) * ny;
          }
        }
      }
    }

    // --- Draw ---
    function drawPulseBar(pulses) {
      const margin = 80;
      const totalWidth = width - margin * 2;
      const dotSpacing = totalWidth / Math.max(pulses - 1, 1);
      const y = 20;

      for (let i = 0; i < pulses; i++) {
        const x = pulses === 1 ? width / 2 : margin + i * dotSpacing;
        const isCurrent = i === currentPulse;
        const radius = isCurrent ? 4 : 2;

        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);

        if (isCurrent) {
          const b = Math.floor(80 + pulseFlash * 175);
          ctx.fillStyle = `rgb(${b}, ${b}, ${b})`;
        } else {
          ctx.fillStyle = '#222';
        }
        ctx.fill();
      }
    }

    function drawKeyHints() {
      const keys = Object.keys(STONE_KEYS);
      const hintY = height - 24;
      ctx.font = '10px Courier New';
      ctx.textAlign = 'center';

      keys.forEach((key, i) => {
        const type = STONE_KEYS[key];
        const x = 40 + i * 36;
        ctx.fillStyle = '#1a1a1a';
        ctx.fillText(key, x, hintY);

        ctx.beginPath();
        ctx.arc(x, hintY - 14, type.radius * 0.3, 0, Math.PI * 2);
        ctx.fillStyle = '#1a1a1a';
        ctx.fill();
      });
    }

    // --- Loop ---
    function loop() {
      const now = performance.now();

      // Quantize: flush pending hits on each pulse tick
      // One measure = 4 beats at the given BPM, divided into N pulses
      const bpm = parseFloat(tempoSlider.value);
      const pulses = parseInt(pulsesSlider.value);
      const measureMs = (60000 / bpm) * 4;
      const pulseMs = measureMs / pulses;
      if (now - lastTickTime >= pulseMs) {
        lastTickTime = now - ((now - lastTickTime) % pulseMs);
        currentPulse = (currentPulse + 1) % pulses;
        pulseFlash = 1;
        flushHits();
      }
      if (pulseFlash > 0) pulseFlash -= 0.06;

      // Window movement — offset stones instantly, let wall collisions handle the rest
      const screenDx = window.screenX - lastScreenX;
      const screenDy = window.screenY - lastScreenY;
      lastScreenX = window.screenX;
      lastScreenY = window.screenY;

      if (screenDx !== 0 || screenDy !== 0) {
        for (const stone of stones) {
          stone.x -= screenDx;
          stone.y -= screenDy;
        }
      }

      ctx.fillStyle = '#0a0a0a';
      ctx.fillRect(0, 0, width, height);

      drawPulseBar(pulses);
      drawKeyHints();

      for (const stone of stones) {
        stone.update();
      }
      collideStones();
      for (const stone of stones) {
        stone.draw();
      }

      // Draw drag vector
      if (dragging && !dragStone && mode === 'throw') {
        const dx = mouseX - dragStartX;
        const dy = mouseY - dragStartY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > 5) {
          const speed = (dist * 0.1).toFixed(1);

          // Line
          ctx.beginPath();
          ctx.moveTo(dragStartX, dragStartY);
          ctx.lineTo(mouseX, mouseY);
          ctx.strokeStyle = '#fff';
          ctx.lineWidth = 1;
          ctx.stroke();

          // Arrowhead
          const angle = Math.atan2(dy, dx);
          const headLen = 8;
          ctx.beginPath();
          ctx.moveTo(mouseX, mouseY);
          ctx.lineTo(mouseX - headLen * Math.cos(angle - 0.4), mouseY - headLen * Math.sin(angle - 0.4));
          ctx.moveTo(mouseX, mouseY);
          ctx.lineTo(mouseX - headLen * Math.cos(angle + 0.4), mouseY - headLen * Math.sin(angle + 0.4));
          ctx.strokeStyle = '#fff';
          ctx.stroke();

          // Speed label
          ctx.font = '11px Courier New';
          ctx.fillStyle = '#fff';
          ctx.textAlign = 'left';
          ctx.fillText(speed, mouseX + 10, mouseY - 10);
        }
      } else if (dragging && dragStone && mode === 'throw') {
        const dx = mouseX - dragStartX;
        const dy = mouseY - dragStartY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > 5) {
          const speed = (dist * 0.15).toFixed(1);

          ctx.beginPath();
          ctx.moveTo(dragStone.x, dragStone.y);
          ctx.lineTo(dragStone.x + dx, dragStone.y + dy);
          ctx.strokeStyle = '#fff';
          ctx.lineWidth = 1;
          ctx.stroke();

          const angle = Math.atan2(dy, dx);
          const headLen = 8;
          ctx.beginPath();
          ctx.moveTo(dragStone.x + dx, dragStone.y + dy);
          ctx.lineTo(dragStone.x + dx - headLen * Math.cos(angle - 0.4), dragStone.y + dy - headLen * Math.sin(angle - 0.4));
          ctx.moveTo(dragStone.x + dx, dragStone.y + dy);
          ctx.lineTo(dragStone.x + dx - headLen * Math.cos(angle + 0.4), dragStone.y + dy - headLen * Math.sin(angle + 0.4));
          ctx.strokeStyle = '#fff';
          ctx.stroke();

          ctx.font = '11px Courier New';
          ctx.fillStyle = '#fff';
          ctx.textAlign = 'left';
          ctx.fillText(speed, dragStone.x + dx + 10, dragStone.y + dy - 10);
        }
      }

      if (stones.length > 200) {
        stones = stones.slice(-200);
      }

      requestAnimationFrame(loop);
    }

    // --- Input ---
    let mode = 'throw'; // 'throw' or 'drag'
    const modeToggle = document.getElementById('mode-toggle');
    modeToggle.addEventListener('click', () => {
      mode = mode === 'throw' ? 'drag' : 'throw';
      modeToggle.textContent = mode;
    });

    let dragging = false;
    let dragStartX = 0;
    let dragStartY = 0;
    let dragStone = null;
    let dragSavedVx = 0;
    let dragSavedVy = 0;

    function stoneAtPoint(x, y) {
      // Search in reverse so topmost (newest) stones are picked first
      for (let i = stones.length - 1; i >= 0; i--) {
        const s = stones[i];
        const dx = x - s.x;
        const dy = y - s.y;
        if (dx * dx + dy * dy <= s.radius * s.radius) return s;
      }
      return null;
    }

    canvas.addEventListener('mousedown', (e) => {
      dragging = true;
      dragStartX = e.clientX;
      dragStartY = e.clientY;
      dragStone = stoneAtPoint(e.clientX, e.clientY);
      if (dragStone) {
        dragStone.frozen = true;
        dragSavedVx = dragStone.vx;
        dragSavedVy = dragStone.vy;
        dragStone.vx = 0;
        dragStone.vy = 0;
      }
    });

    window.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;

      if (dragging && dragStone) {
        dragStone.x = e.clientX;
        dragStone.y = e.clientY;
      }
    });

    window.addEventListener('mouseup', (e) => {
      if (!dragging) return;

      const dx = e.clientX - dragStartX;
      const dy = e.clientY - dragStartY;

      if (dragStone) {
        dragStone.frozen = false;
        if (mode === 'drag') {
          // Restore original velocity
          dragStone.vx = dragSavedVx;
          dragStone.vy = dragSavedVy;
        } else {
          // Throw with new velocity
          const throwScale = 0.15;
          dragStone.vx = dx * throwScale;
          dragStone.vy = dy * throwScale;
        }
        dragStone = null;
      } else if (mode === 'throw') {
        // Set all stones to the exact drag direction and speed
        const dist = Math.sqrt(dx * dx + dy * dy);
        const scale = 0.1;
        const newVx = dist > 5 ? dx * scale : 0;
        const newVy = dist > 5 ? dy * scale : 0;
        for (const stone of stones) {
          if (stone.frozen) continue;
          stone.vx = newVx;
          stone.vy = newVy;
        }
      }

      dragging = false;
    });

    window.addEventListener('keydown', (e) => {
      if (e.repeat) return;
      const key = e.key.toLowerCase();

      if (key === 'q') {
        mode = mode === 'throw' ? 'drag' : 'throw';
        modeToggle.textContent = mode;
        return;
      }

      if (key === 'escape') {
        stones = [];
        return;
      }

      if ((e.metaKey || e.ctrlKey) && key === 'z') {
        e.preventDefault();
        stones.pop();
        return;
      }

      const type = STONE_KEYS[key];
      if (!type) return;

      initAudio();

      const speedMult = parseFloat(speedSlider.value);
      const stone = new Stone(mouseX, mouseY, type, speedMult);
      stones.push(stone);
    });

    // Start
    loop();
  </script>
</body>
</html>
