<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>teophone</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      cursor: crosshair;
      user-select: none;
    }

    canvas {
      display: block;
    }

    #speed-control {
      position: fixed;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: 16px;
    }

    #speed-control label {
      color: #666;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      writing-mode: vertical-rl;
      text-orientation: mixed;
    }

    #speed-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 80px;
      height: 2px;
      background: #444;
      outline: none;
      transform: rotate(-90deg);
      margin: 36px 0;
    }

    #speed-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 10px;
      height: 10px;
      background: #aaa;
      border-radius: 50%;
      cursor: pointer;
    }

    #speed-slider::-webkit-slider-thumb:hover {
      background: #ccc;
    }

    #bpm-control {
      position: fixed;
      top: 12px;
      left: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #bpm-control label {
      color: #666;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    #bpm-input {
      background: none;
      border: 1px solid #333;
      color: #888;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      width: 44px;
      text-align: center;
      padding: 2px 4px;
      border-radius: 2px;
      outline: none;
      -moz-appearance: textfield;
    }

    #bpm-input::-webkit-inner-spin-button,
    #bpm-input::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    #bpm-input:focus {
      border-color: #666;
      color: #ccc;
    }

    #pulses-control {
      position: fixed;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: 16px;
    }

    #pulses-control label {
      color: #666;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      writing-mode: vertical-rl;
      text-orientation: mixed;
    }

    #pulses-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 80px;
      height: 2px;
      background: #444;
      outline: none;
      transform: rotate(-90deg);
      margin: 36px 0;
    }

    #pulses-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 10px;
      height: 10px;
      background: #aaa;
      border-radius: 50%;
      cursor: pointer;
    }

    #pulses-slider::-webkit-slider-thumb:hover {
      background: #ccc;
    }

    #pulses-display {
      color: #666;
      font-size: 10px;
      letter-spacing: 1px;
    }

    #mode-toggle {
      position: fixed;
      top: 16px;
      right: 16px;
      background: none;
      border: 1px solid #444;
      color: #888;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 4px 10px;
      cursor: pointer;
      border-radius: 2px;
    }

    #mode-toggle:hover {
      border-color: #888;
      color: #ccc;
    }

    #pause-btn {
      position: fixed;
      top: 16px;
      right: 80px;
      background: none;
      border: 1px solid #444;
      color: #888;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 4px 10px;
      cursor: pointer;
      border-radius: 2px;
    }

    #pause-btn:hover {
      border-color: #888;
      color: #ccc;
    }

    #pause-btn.paused {
      border-color: #888;
      color: #ccc;
    }

    #shape-indicator {
      position: fixed;
      top: 16px;
      right: 210px;
      border: 1px solid #444;
      color: #888;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 2px;
      opacity: 0;
      transition: opacity 0.1s;
    }

    #shape-indicator.active {
      opacity: 1;
    }

    #ringer-notice {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #181818;
      border-top: 1px solid #333;
      color: #888;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      text-align: center;
      padding: 12px 40px 12px 16px;
      z-index: 20;
    }

    #ringer-notice .dismiss {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #666;
      font-size: 16px;
      cursor: pointer;
    }

    #sounds-btn {
      position: fixed;
      bottom: 16px;
      right: 20px;
      background: none;
      border: 1px solid #333;
      color: #666;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 4px 8px;
      cursor: pointer;
      border-radius: 2px;
      z-index: 5;
    }

    #sounds-btn:hover {
      border-color: #666;
      color: #aaa;
    }

    #record-btn {
      position: fixed;
      top: 16px;
      right: 150px;
      background: none;
      border: 1px solid #444;
      color: #888;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 4px 10px;
      cursor: pointer;
      border-radius: 2px;
    }

    #record-btn:hover {
      border-color: #888;
      color: #ccc;
    }

    #record-btn.recording {
      border-color: #a33;
      color: #e55;
    }

    #sound-menu {
      display: none;
      position: fixed;
      bottom: 80px;
      right: 20px;
      background: #111;
      border: 1px solid #333;
      border-radius: 3px;
      padding: 12px 16px;
      font-family: 'Courier New', monospace;
      z-index: 10;
    }

    #sound-menu.open {
      display: block;
    }

    #sound-menu h3 {
      color: #666;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin: 0 0 10px 0;
      font-weight: normal;
    }

    .sound-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 4px 0;
    }

    .sound-row .key-label {
      color: #888;
      font-size: 12px;
      width: 14px;
      text-align: center;
    }

    .sound-row .sound-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .sound-row .sound-name {
      color: #555;
      font-size: 10px;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 120px;
    }

    .sound-row .upload-btn {
      background: none;
      border: 1px solid #333;
      color: #666;
      font-family: 'Courier New', monospace;
      font-size: 9px;
      padding: 2px 6px;
      cursor: pointer;
      border-radius: 2px;
    }

    .sound-row .upload-btn:hover {
      border-color: #666;
      color: #aaa;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="ringer-notice">
    turn off silent mode to hear sounds
    <button class="dismiss" onclick="this.parentElement.style.display='none'">&times;</button>
  </div>
  <input type="file" id="sample-upload" accept="audio/*" style="display:none">
  <button id="mode-toggle">drag</button>
  <button id="pause-btn">pause</button>
  <button id="record-btn">rec</button>
  <span id="shape-indicator">square</span>
  <button id="sounds-btn">sounds</button>
  <div id="sound-menu">
    <h3>sounds</h3>
    <div id="sound-rows"></div>
  </div>
  <div id="speed-control">
    <input type="range" id="speed-slider" min="0" max="4" step="0.05" value="1">
    <label>speed</label>
  </div>
  <div id="bpm-control">
    <input type="number" id="bpm-input" min="1" max="999" value="120">
    <label>bpm</label>
  </div>
  <div id="pulses-control">
    <span id="pulses-display">16</span>
    <input type="range" id="pulses-slider" min="1" max="64" step="1" value="16">
    <label>pulses</label>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const speedSlider = document.getElementById('speed-slider');
    const bpmInput = document.getElementById('bpm-input');
    const pulsesSlider = document.getElementById('pulses-slider');
    const pulsesDisplay = document.getElementById('pulses-display');

    pulsesSlider.addEventListener('input', () => {
      pulsesDisplay.textContent = pulsesSlider.value;
    });

    let width, height;
    let mouseX = 0;
    let mouseY = 0;
    let stones = [];
    let audioCtx = null;

    // --- Window movement tracking ---
    let lastScreenX = window.screenX;
    let lastScreenY = window.screenY;

    // --- Quantization ---
    // Pending hits get snapped to the nearest 16th note
    let pendingHits = [];
    let lastTickTime = 0;
    let currentPulse = 0;
    let pulseFlash = 0;
    let paused = false;

    // --- Stone types mapped to keys ---
    const STONE_KEYS = {
      'a': { radius: 6,  mass: 1,   freq: 800,  color: '#e0e0e0', decay: 0.04 },
      's': { radius: 9,  mass: 1.5, freq: 600,  color: '#c8c8c8', decay: 0.06 },
      'd': { radius: 12, mass: 2,   freq: 440,  color: '#b0b0b0', decay: 0.08 },
      'f': { radius: 16, mass: 3,   freq: 320,  color: '#989898', decay: 0.10 },
      'g': { radius: 20, mass: 4,   freq: 220,  color: '#808080', decay: 0.12 },
      'h': { radius: 25, mass: 5.5, freq: 160,  color: '#686868', decay: 0.14 },
      'j': { radius: 30, mass: 7,   freq: 110,  color: '#505050', decay: 0.16 },
      'k': { radius: 36, mass: 9,   freq: 80,   color: '#383838', decay: 0.18 },
      'l': { radius: 42, mass: 12,  freq: 55,   color: '#282828', decay: 0.20 },
    };

    // --- Resize ---
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // --- Custom samples ---
    const customSamples = {}; // key -> AudioBuffer
    const sampleUpload = document.getElementById('sample-upload');
    let uploadTargetKey = null;

    sampleUpload.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file || !uploadTargetKey) return;
      initAudio();
      const key = uploadTargetKey;
      const reader = new FileReader();
      reader.onload = () => {
        audioCtx.decodeAudioData(reader.result, (buffer) => {
          customSamples[key] = buffer;
          sampleNames[key] = file.name;
          buildSoundMenu();
        });
      };
      reader.readAsArrayBuffer(file);
      sampleUpload.value = '';
      uploadTargetKey = null;
    });

    // --- Audio ---
    let masterGain = null;
    let mediaStreamDest = null;
    let mediaRecorder = null;
    let recordedChunks = [];

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain();
        masterGain.connect(audioCtx.destination);
        mediaStreamDest = audioCtx.createMediaStreamDestination();
        masterGain.connect(mediaStreamDest);
      }
    }

    function playSample(key, velocity) {
      if (!audioCtx || !customSamples[key]) return;
      const vol = Math.min(1, velocity / 400);
      if (vol < 0.01) return;

      const source = audioCtx.createBufferSource();
      source.buffer = customSamples[key];

      const gain = audioCtx.createGain();
      gain.gain.value = vol;

      source.connect(gain);
      gain.connect(masterGain);
      source.start();
    }

    function queueHit(freq, velocity, decay, key) {
      pendingHits.push({ freq, velocity, decay, key });
    }

    function flushHits() {
      if (pendingHits.length === 0) return;

      // Merge hits that are very similar (same key or within an octave) to avoid overload
      const merged = [];
      for (const hit of pendingHits) {
        let found = false;
        for (const m of merged) {
          if (m.key === hit.key && Math.abs(m.freq - hit.freq) < m.freq * 0.5) {
            m.velocity = Math.max(m.velocity, hit.velocity);
            found = true;
            break;
          }
        }
        if (!found) merged.push({ ...hit });
      }
      pendingHits = [];

      for (const hit of merged) {
        if (hit.key && customSamples[hit.key]) {
          playSample(hit.key, hit.velocity);
        } else {
          playHit(hit.freq, hit.velocity, hit.decay);
        }
      }
    }

    function playHit(freq, velocity, decay) {
      if (!audioCtx) return;
      const vol = Math.min(1, velocity / 400);
      if (vol < 0.01) return;

      const now = audioCtx.currentTime;
      const duration = decay * (0.5 + vol * 0.5);

      // Noise burst for the attack
      const bufferSize = Math.max(1, Math.floor(audioCtx.sampleRate * duration));
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufferSize * 0.15));
      }

      const noise = audioCtx.createBufferSource();
      noise.buffer = buffer;

      const noiseFilter = audioCtx.createBiquadFilter();
      noiseFilter.type = 'bandpass';
      noiseFilter.frequency.value = freq * 2;
      noiseFilter.Q.value = 1.5;

      const noiseGain = audioCtx.createGain();
      noiseGain.gain.setValueAtTime(vol * 0.4, now);
      noiseGain.gain.exponentialRampToValueAtTime(0.001, now + duration);

      noise.connect(noiseFilter);
      noiseFilter.connect(noiseGain);
      noiseGain.connect(masterGain);
      noise.start(now);
      noise.stop(now + duration);

      // Tone body
      const osc = audioCtx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, now);
      osc.frequency.exponentialRampToValueAtTime(freq * 0.5, now + duration);

      const oscGain = audioCtx.createGain();
      oscGain.gain.setValueAtTime(vol * 0.3, now);
      oscGain.gain.exponentialRampToValueAtTime(0.001, now + duration);

      osc.connect(oscGain);
      oscGain.connect(masterGain);
      osc.start(now);
      osc.stop(now + duration);
    }

    // --- Stone ---
    class Stone {
      constructor(x, y, type, speedMult, key, shape) {
        this.key = key;
        this.shape = shape || 'circle'; // 'circle' or 'square'
        this.axis = null; // null for circles, 'h' or 'v' for squares
        this.x = x;
        this.y = y;
        if (speedMult === 0) {
          this.vx = 0;
          this.vy = 0;
        } else if (this.shape === 'square') {
          this.axis = Math.random() < 0.5 ? 'h' : 'v';
          const baseSpeed = (2 + Math.random() * 3) * speedMult;
          this.vx = this.axis === 'h' ? baseSpeed * (Math.random() < 0.5 ? 1 : -1) : 0;
          this.vy = this.axis === 'v' ? baseSpeed * (Math.random() < 0.5 ? 1 : -1) : 0;
        } else {
          const angle = Math.random() * Math.PI * 2;
          const baseSpeed = (2 + Math.random() * 3) * speedMult;
          this.vx = Math.cos(angle) * baseSpeed;
          this.vy = Math.sin(angle) * baseSpeed;
        }
        this.radius = type.radius;
        this.mass = type.mass;
        this.freq = type.freq;
        this.color = type.color;
        this.decay = type.decay;
        this.flash = 0;
        this.frozen = false;
      }

      update() {
        if (this.frozen) return;
        // Enforce axis constraint for squares — preserve speed on the allowed axis
        if (this.axis === 'h' && this.vy !== 0) {
          const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
          this.vx = speed * Math.sign(this.vx || 1);
          this.vy = 0;
        }
        if (this.axis === 'v' && this.vx !== 0) {
          const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
          this.vy = speed * Math.sign(this.vy || 1);
          this.vx = 0;
        }
        this.x += this.vx;
        this.y += this.vy;

        // Flash decay
        if (this.flash > 0) this.flash -= 0.05;

        // Wall collisions — all four edges
        if (this.x - this.radius < 0) {
          this.x = this.radius;
          this.vx = Math.abs(this.vx);
          const impact = Math.abs(this.vx) * this.mass;
          if (impact > 1) {
            queueHit(this.freq, impact * 20, this.decay, this.key);
            this.flash = Math.min(1, impact / 10);
          }
        }
        if (this.x + this.radius > width) {
          this.x = width - this.radius;
          this.vx = -Math.abs(this.vx);
          const impact = Math.abs(this.vx) * this.mass;
          if (impact > 1) {
            queueHit(this.freq, impact * 20, this.decay, this.key);
            this.flash = Math.min(1, impact / 10);
          }
        }
        if (this.y - this.radius < 0) {
          this.y = this.radius;
          this.vy = Math.abs(this.vy);
          const impact = Math.abs(this.vy) * this.mass;
          if (impact > 1) {
            queueHit(this.freq, impact * 20, this.decay, this.key);
            this.flash = Math.min(1, impact / 10);
          }
        }
        if (this.y + this.radius > height) {
          this.y = height - this.radius;
          this.vy = -Math.abs(this.vy);
          const impact = Math.abs(this.vy) * this.mass;
          if (impact > 1) {
            queueHit(this.freq, impact * 20, this.decay, this.key);
            this.flash = Math.min(1, impact / 10);
          }
        }
      }

      draw() {
        if (this.flash > 0) {
          const brightness = Math.floor(this.flash * 255);
          ctx.fillStyle = `rgb(${brightness}, ${brightness}, ${brightness})`;
        } else {
          ctx.fillStyle = this.color;
        }

        if (this.shape === 'square') {
          const size = this.radius * 2;
          ctx.fillRect(this.x - this.radius, this.y - this.radius, size, size);
        } else {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    // --- Stone-stone collisions ---
    function collideStones() {
      for (let i = 0; i < stones.length; i++) {
        for (let j = i + 1; j < stones.length; j++) {
          const a = stones[i];
          const b = stones[j];
          const dx = b.x - a.x;
          const dy = b.y - a.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          const minDist = a.radius + b.radius;

          if (dist < minDist && dist > 0) {
            const nx = dx / dist;
            const ny = dy / dist;

            const dvx = a.vx - b.vx;
            const dvy = a.vy - b.vy;
            const dvn = dvx * nx + dvy * ny;

            if (dvn > 0) {
              // Save speeds before collision
              const aSpeed = Math.sqrt(a.vx * a.vx + a.vy * a.vy);
              const bSpeed = Math.sqrt(b.vx * b.vx + b.vy * b.vy);

              const impulse = dvn / (1 / a.mass + 1 / b.mass);

              a.vx -= (impulse / a.mass) * nx;
              a.vy -= (impulse / a.mass) * ny;
              b.vx += (impulse / b.mass) * nx;
              b.vy += (impulse / b.mass) * ny;

              // Restore original speeds (change direction, not magnitude)
              const aNewSpeed = Math.sqrt(a.vx * a.vx + a.vy * a.vy);
              const bNewSpeed = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
              if (aNewSpeed > 0) { a.vx *= aSpeed / aNewSpeed; a.vy *= aSpeed / aNewSpeed; }
              if (bNewSpeed > 0) { b.vx *= bSpeed / bNewSpeed; b.vy *= bSpeed / bNewSpeed; }

              // Sound — play both stones' sounds
              const impact = Math.abs(dvn);
              if (impact > 1) {
                const vol = impact * Math.min(a.mass, b.mass) * 15;
                queueHit(a.freq, vol, a.decay, a.key);
                queueHit(b.freq, vol, b.decay, b.key);
                a.flash = Math.min(1, impact / 8);
                b.flash = Math.min(1, impact / 8);
              }
            }

            // Separate overlapping stones
            const overlap = minDist - dist;
            const totalMass = a.mass + b.mass;
            a.x -= (overlap * (b.mass / totalMass)) * nx;
            a.y -= (overlap * (b.mass / totalMass)) * ny;
            b.x += (overlap * (a.mass / totalMass)) * nx;
            b.y += (overlap * (a.mass / totalMass)) * ny;
          }
        }
      }
    }

    // --- Draw ---
    function drawPulseBar(pulses) {
      const margin = 80;
      const totalWidth = width - margin * 2;
      const dotSpacing = totalWidth / Math.max(pulses - 1, 1);
      const y = 20;

      for (let i = 0; i < pulses; i++) {
        const x = pulses === 1 ? width / 2 : margin + i * dotSpacing;
        const isCurrent = i === currentPulse;
        const radius = isCurrent ? 4 : 2;

        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);

        if (isCurrent) {
          const b = Math.floor(80 + pulseFlash * 175);
          ctx.fillStyle = `rgb(${b}, ${b}, ${b})`;
        } else {
          ctx.fillStyle = '#222';
        }
        ctx.fill();
      }
    }

    function getKeyHintBounds() {
      const keys = Object.keys(STONE_KEYS);
      const count = keys.length;
      const spacing = 36;
      const totalWidth = (count - 1) * spacing;
      const maxRadius = 42 * 0.3; // largest ball preview radius
      const padX = 20;
      const padY = 20;
      const boxRight = width - 20;
      const boxBottom = height - 16;
      const boxHeight = maxRadius * 2 + 24 + padY * 2; // circles + text + padding
      const boxTop = boxBottom - boxHeight;
      const startX = boxRight - padX - totalWidth;
      const boxLeft = startX - padX;
      const centerY = boxTop + padY + maxRadius; // vertical center for circles
      const textY = centerY + maxRadius + 16; // text below circles
      return { keys, startX, centerY, textY, spacing, boxLeft, boxTop, boxRight, boxBottom };
    }

    function drawKeyHints() {
      const { keys, startX, centerY, textY, spacing, boxLeft, boxTop, boxRight, boxBottom } = getKeyHintBounds();

      // Outline box
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 1;
      ctx.strokeRect(boxLeft, boxTop, boxRight - boxLeft, boxBottom - boxTop);

      ctx.font = '10px Courier New';
      ctx.textAlign = 'center';

      keys.forEach((key, i) => {
        const type = STONE_KEYS[key];
        const x = startX + i * spacing;
        const isSelected = key === selectedKey;
        const hasCustom = !!customSamples[key];
        const color = isSelected ? '#fff' : hasCustom ? '#888' : '#333';
        ctx.fillStyle = color;
        ctx.fillText(key, x, textY);

        ctx.beginPath();
        ctx.arc(x, centerY, type.radius * 0.3, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
      });
    }

    // --- Sound menu ---
    const soundMenu = document.getElementById('sound-menu');
    const soundRows = document.getElementById('sound-rows');
    const sampleNames = {}; // key -> filename

    function buildSoundMenu() {
      soundRows.innerHTML = '';
      const keys = Object.keys(STONE_KEYS);
      keys.forEach((key) => {
        const type = STONE_KEYS[key];
        const row = document.createElement('div');
        row.className = 'sound-row';

        const label = document.createElement('span');
        label.className = 'key-label';
        label.textContent = key;

        const dot = document.createElement('span');
        dot.className = 'sound-dot';
        dot.style.background = type.color;

        const name = document.createElement('span');
        name.className = 'sound-name';
        name.id = 'sound-name-' + key;
        name.textContent = sampleNames[key] || 'default';

        const btn = document.createElement('button');
        btn.className = 'upload-btn';
        btn.textContent = customSamples[key] ? 'change' : 'upload';
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          initAudio();
          uploadTargetKey = key;
          sampleUpload.click();
        });

        row.appendChild(label);
        row.appendChild(dot);
        row.appendChild(name);
        row.appendChild(btn);
        soundRows.appendChild(row);
      });
    }

    buildSoundMenu();

    const soundsBtn = document.getElementById('sounds-btn');
    soundsBtn.addEventListener('click', () => {
      soundMenu.classList.toggle('open');
    });

    // Toggle menu on click inside the ball box
    let selectedKey = 'g';

    function isInsideKeyBox(x, y) {
      const { boxLeft, boxTop, boxRight, boxBottom } = getKeyHintBounds();
      return x >= boxLeft && x <= boxRight && y >= boxTop && y <= boxBottom;
    }

    function keyHintAtPoint(x, y) {
      const { keys, startX, centerY, textY, spacing } = getKeyHintBounds();
      for (let i = 0; i < keys.length; i++) {
        const kx = startX + i * spacing;
        if (Math.abs(x - kx) < 16 && y >= centerY - 16 && y <= textY + 8) {
          return keys[i];
        }
      }
      return null;
    }

    canvas.addEventListener('click', (e) => {
      if (isInsideKeyBox(e.clientX, e.clientY)) {
        const key = keyHintAtPoint(e.clientX, e.clientY);
        if (key) {
          selectedKey = selectedKey === key ? null : key;
          return;
        }
      }
      if (soundMenu.classList.contains('open')) {
        soundMenu.classList.remove('open');
      }
    });

    // --- Loop ---
    function loop() {
      const now = performance.now();

      const bpm = parseFloat(bpmInput.value) || 120;
      const pulses = parseInt(pulsesSlider.value);

      if (!paused) {
        // Quantize: flush pending hits on each pulse tick
        const measureMs = (60000 / bpm) * 4;
        const pulseMs = measureMs / pulses;
        if (now - lastTickTime >= pulseMs) {
          lastTickTime = now - ((now - lastTickTime) % pulseMs);
          currentPulse = (currentPulse + 1) % pulses;
          pulseFlash = 1;
          flushHits();
        }
        if (pulseFlash > 0) pulseFlash -= 0.06;

        // Window movement — offset stones instantly, let wall collisions handle the rest
        const screenDx = window.screenX - lastScreenX;
        const screenDy = window.screenY - lastScreenY;
        lastScreenX = window.screenX;
        lastScreenY = window.screenY;

        if (screenDx !== 0 || screenDy !== 0) {
          for (const stone of stones) {
            stone.x -= screenDx;
            stone.y -= screenDy;
          }
        }
      }

      ctx.fillStyle = '#0a0a0a';
      ctx.fillRect(0, 0, width, height);

      drawPulseBar(pulses);
      drawKeyHints();

      if (!paused) {
        for (const stone of stones) {
          stone.update();
        }
        collideStones();
      }
      for (const stone of stones) {
        stone.draw();
      }

      // Draw drag vector
      if (dragging && !dragStone && mode === 'throw') {
        const dx = mouseX - dragStartX;
        const dy = mouseY - dragStartY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > 5) {
          const speed = (dist * 0.1).toFixed(1);

          // Line
          ctx.beginPath();
          ctx.moveTo(dragStartX, dragStartY);
          ctx.lineTo(mouseX, mouseY);
          ctx.strokeStyle = '#fff';
          ctx.lineWidth = 1;
          ctx.stroke();

          // Arrowhead
          const angle = Math.atan2(dy, dx);
          const headLen = 8;
          ctx.beginPath();
          ctx.moveTo(mouseX, mouseY);
          ctx.lineTo(mouseX - headLen * Math.cos(angle - 0.4), mouseY - headLen * Math.sin(angle - 0.4));
          ctx.moveTo(mouseX, mouseY);
          ctx.lineTo(mouseX - headLen * Math.cos(angle + 0.4), mouseY - headLen * Math.sin(angle + 0.4));
          ctx.strokeStyle = '#fff';
          ctx.stroke();

          // Speed label
          ctx.font = '11px Courier New';
          ctx.fillStyle = '#fff';
          ctx.textAlign = 'left';
          ctx.fillText(speed, mouseX + 10, mouseY - 10);
        }
      } else if (dragging && dragStone && mode === 'throw') {
        const dx = mouseX - dragStartX;
        const dy = mouseY - dragStartY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > 5) {
          const speed = (dist * 0.15).toFixed(1);

          ctx.beginPath();
          ctx.moveTo(dragStone.x, dragStone.y);
          ctx.lineTo(dragStone.x + dx, dragStone.y + dy);
          ctx.strokeStyle = '#fff';
          ctx.lineWidth = 1;
          ctx.stroke();

          const angle = Math.atan2(dy, dx);
          const headLen = 8;
          ctx.beginPath();
          ctx.moveTo(dragStone.x + dx, dragStone.y + dy);
          ctx.lineTo(dragStone.x + dx - headLen * Math.cos(angle - 0.4), dragStone.y + dy - headLen * Math.sin(angle - 0.4));
          ctx.moveTo(dragStone.x + dx, dragStone.y + dy);
          ctx.lineTo(dragStone.x + dx - headLen * Math.cos(angle + 0.4), dragStone.y + dy - headLen * Math.sin(angle + 0.4));
          ctx.strokeStyle = '#fff';
          ctx.stroke();

          ctx.font = '11px Courier New';
          ctx.fillStyle = '#fff';
          ctx.textAlign = 'left';
          ctx.fillText(speed, dragStone.x + dx + 10, dragStone.y + dy - 10);
        }
      }

      if (stones.length > 200) {
        stones = stones.slice(-200);
      }

      requestAnimationFrame(loop);
    }

    // --- Input ---
    let mode = 'drag'; // 'throw' or 'drag'
    const modeToggle = document.getElementById('mode-toggle');
    modeToggle.addEventListener('click', () => {
      mode = mode === 'throw' ? 'drag' : 'throw';
      modeToggle.textContent = mode;
    });

    const pauseBtn = document.getElementById('pause-btn');
    pauseBtn.addEventListener('click', () => {
      paused = !paused;
      pauseBtn.textContent = paused ? 'play' : 'pause';
      pauseBtn.classList.toggle('paused', paused);
      if (!paused) lastTickTime = performance.now();
    });

    const recordBtn = document.getElementById('record-btn');
    let isRecording = false;

    function startRecording() {
      initAudio();
      recordedChunks = [];
      mediaRecorder = new MediaRecorder(mediaStreamDest.stream);
      mediaRecorder.ondataavailable = (e) => {
        if (e.data.size > 0) recordedChunks.push(e.data);
      };
      mediaRecorder.onstop = async () => {
        const webmBlob = new Blob(recordedChunks, { type: 'audio/webm' });
        const arrayBuf = await webmBlob.arrayBuffer();
        const audioBuf = await audioCtx.decodeAudioData(arrayBuf);

        // Encode as WAV
        const numChannels = audioBuf.numberOfChannels;
        const sampleRate = audioBuf.sampleRate;
        const length = audioBuf.length;
        const wavBuf = new ArrayBuffer(44 + length * numChannels * 2);
        const view = new DataView(wavBuf);

        function writeString(offset, str) {
          for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
        }

        writeString(0, 'RIFF');
        view.setUint32(4, 36 + length * numChannels * 2, true);
        writeString(8, 'WAVE');
        writeString(12, 'fmt ');
        view.setUint32(16, 16, true);
        view.setUint16(20, 1, true);
        view.setUint16(22, numChannels, true);
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, sampleRate * numChannels * 2, true);
        view.setUint16(32, numChannels * 2, true);
        view.setUint16(34, 16, true);
        writeString(36, 'data');
        view.setUint32(40, length * numChannels * 2, true);

        const channels = [];
        for (let c = 0; c < numChannels; c++) channels.push(audioBuf.getChannelData(c));

        let offset = 44;
        for (let i = 0; i < length; i++) {
          for (let c = 0; c < numChannels; c++) {
            const sample = Math.max(-1, Math.min(1, channels[c][i]));
            view.setInt16(offset, sample * 0x7FFF, true);
            offset += 2;
          }
        }

        const wavBlob = new Blob([wavBuf], { type: 'audio/wav' });
        const url = URL.createObjectURL(wavBlob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'teophone-' + new Date().toISOString().slice(0, 19).replace(/:/g, '-') + '.wav';
        a.click();
        URL.revokeObjectURL(url);
      };
      mediaRecorder.start();
      isRecording = true;
      recordBtn.textContent = 'stop';
      recordBtn.classList.add('recording');
    }

    function stopRecording() {
      if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
      }
      isRecording = false;
      recordBtn.textContent = 'rec';
      recordBtn.classList.remove('recording');
    }

    recordBtn.addEventListener('click', () => {
      if (isRecording) {
        stopRecording();
      } else {
        startRecording();
      }
    });

    const shapeIndicator = document.getElementById('shape-indicator');
    window.addEventListener('keydown', (e) => {
      if (e.key === 'Shift') shapeIndicator.classList.add('active');
    });
    window.addEventListener('keyup', (e) => {
      if (e.key === 'Shift') shapeIndicator.classList.remove('active');
    });

    let dragging = false;
    let dragStartX = 0;
    let dragStartY = 0;
    let dragStone = null;
    let dragSavedVx = 0;
    let dragSavedVy = 0;

    function stoneAtPoint(x, y) {
      for (let i = stones.length - 1; i >= 0; i--) {
        const s = stones[i];
        if (s.shape === 'square') {
          if (Math.abs(x - s.x) <= s.radius && Math.abs(y - s.y) <= s.radius) return s;
        } else {
          const dx = x - s.x;
          const dy = y - s.y;
          if (dx * dx + dy * dy <= s.radius * s.radius) return s;
        }
      }
      return null;
    }

    canvas.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      const stone = stoneAtPoint(e.clientX, e.clientY);
      if (stone) {
        stones.splice(stones.indexOf(stone), 1);
      }
    });

    canvas.addEventListener('mousedown', (e) => {
      if (isInsideKeyBox(e.clientX, e.clientY)) return;

      // In drag mode with a selected key, spawn on empty space
      if (mode === 'drag' && selectedKey && !stoneAtPoint(e.clientX, e.clientY)) {
        initAudio();
        const type = STONE_KEYS[selectedKey];
        const speedMult = parseFloat(speedSlider.value);
        const stone = new Stone(e.clientX, e.clientY, type, speedMult, selectedKey);
        stones.push(stone);
        return;
      }

      dragging = true;
      dragStartX = e.clientX;
      dragStartY = e.clientY;
      dragStone = stoneAtPoint(e.clientX, e.clientY);
      if (dragStone) {
        dragStone.frozen = true;
        dragSavedVx = dragStone.vx;
        dragSavedVy = dragStone.vy;
        dragStone.vx = 0;
        dragStone.vy = 0;
      }
    });

    window.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;

      if (dragging && dragStone) {
        dragStone.x = e.clientX;
        dragStone.y = e.clientY;
      }
    });

    window.addEventListener('mouseup', (e) => {
      if (!dragging) return;

      const dx = e.clientX - dragStartX;
      const dy = e.clientY - dragStartY;

      if (dragStone) {
        dragStone.frozen = false;
        if (mode === 'drag') {
          // Restore original velocity
          dragStone.vx = dragSavedVx;
          dragStone.vy = dragSavedVy;
        } else {
          // Throw with new velocity
          const throwScale = 0.15;
          dragStone.vx = dx * throwScale;
          dragStone.vy = dy * throwScale;
          // Enforce axis for squares
          if (dragStone.axis === 'h') dragStone.vy = 0;
          if (dragStone.axis === 'v') dragStone.vx = 0;
        }
        dragStone = null;
      } else if (mode === 'throw') {
        // Set all stones to the exact drag direction and speed
        const dist = Math.sqrt(dx * dx + dy * dy);
        const scale = 0.1;
        const newVx = dist > 5 ? dx * scale : 0;
        const newVy = dist > 5 ? dy * scale : 0;
        for (const stone of stones) {
          if (stone.frozen) continue;
          stone.vx = stone.axis === 'v' ? 0 : newVx;
          stone.vy = stone.axis === 'h' ? 0 : newVy;
        }
      }

      dragging = false;
    });

    window.addEventListener('keydown', (e) => {
      if (e.repeat) return;
      if (e.target === bpmInput) return;
      const key = e.key.toLowerCase();

      if (key === 'q') {
        mode = mode === 'throw' ? 'drag' : 'throw';
        modeToggle.textContent = mode;
        return;
      }

      if (e.key === ' ') {
        e.preventDefault();
        paused = !paused;
        pauseBtn.textContent = paused ? 'play' : 'pause';
        pauseBtn.classList.toggle('paused', paused);
        if (!paused) {
          lastTickTime = performance.now();
        }
        return;
      }

      if (key === 'escape') {
        stones = [];
        return;
      }

      if ((e.metaKey || e.ctrlKey) && key === 'z') {
        e.preventDefault();
        stones.pop();
        return;
      }

      const type = STONE_KEYS[key];
      if (!type) return;

      initAudio();

      const speedMult = parseFloat(speedSlider.value);
      const shape = e.shiftKey ? 'square' : 'circle';
      const stone = new Stone(mouseX, mouseY, type, speedMult, key, shape);
      stones.push(stone);
    });

    // Resume audio when returning to the tab
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && audioCtx && audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    });
    window.addEventListener('touchstart', () => {
      if (audioCtx && audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }, { once: false });

    // Show ringer notice on iOS
    if (/iPhone|iPad|iPod/.test(navigator.userAgent)) {
      document.getElementById('ringer-notice').style.display = 'block';
    }

    // Start
    loop();
  </script>
</body>
</html>
